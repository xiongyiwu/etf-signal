name: 定时更新ETF数据

on:
  schedule:
    - cron: '35 6 * * 1-5'   # UTC 6:35 = 北京时间14:35
    - cron: '30 1 * * 1-5'   # UTC 1:30 = 北京时间9:30
    - cron: '0 3 * * 1-5'    # UTC 3:00 = 北京时间11:00
    - cron: '0 5 * * 1-5'    # UTC 5:00 = 北京时间13:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 获取ETF数据
        run: |
          python -c "
import json, urllib.request
from datetime import datetime, timedelta
from collections import defaultdict

ETFS = ['589720','159611','588170','515050','159819','159852','159869','512400','512710','515400','561380','563230']

def fetch(url):
    req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
    with urllib.request.urlopen(req, timeout=20) as resp:
        return json.loads(resp.read().decode('utf-8'))

def ma(d, p):
    r = []
    for i in range(len(d)):
        r.append(sum(d[i-p+1:i+1])/p if i >= p-1 else None)
    return r

results = []
for code in ETFS:
    try:
        d5 = fetch(f'https://quotes.sina.cn/cn/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh{code}&scale=5&datalen=100')
        d120 = fetch(f'https://quotes.sina.cn/cn/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh{code}&scale=120&datalen=120')
        
        if len(d5)<20 or len(d120)<60:
            print(f'{code}: data too short')
            continue
        
        c5 = [float(x['close']) for x in d5]
        t5 = [x['day'] for x in d5]
        c120 = [float(x['close']) for x in d120]
        t120 = [x['day'] for x in d120]
        
        ma5_5 = ma(c5,5); ma60_5 = ma(c5,60)
        ma5_120 = ma(c120,5); ma60_120 = ma(c120,60)
        
        dir120 = {}
        for i in range(len(t120)):
            if ma5_120[i] and ma60_120[i]:
                dir120[t120[i]] = ma5_120[i] > ma60_120[i]
        
        def get_dir(ts):
            dt = datetime.strptime(ts, '%Y-%m-%d %H:%M:%S')
            best, bd = None, None
            for k in dir120:
                kdt = datetime.strptime(k, '%Y-%m-%d %H:%M:%S')
                if kdt <= dt and (bd is None or kdt > bd): best, bd = k, kdt
            return dir120[best] if best else None
        
        cur_dir = get_dir(t5[-1])
        mv = ma5_5[-1] or 0
        m60v = ma60_5[-1] or 0
        price = c5[-1]
        direction = '多头' if cur_dir else '空头'
        signal = '空仓'
        if cur_dir and mv > m60v: signal = '买入'
        
        daily = defaultdict(list)
        for i in range(len(t5)): daily[t5[i][:10]].append(i)
        last_pnl = 0; pos = False; ep = 0; sd = ''
        for day in sorted(daily.keys()):
            idxs = daily[day]; last = idxs[-1]
            dd = get_dir(t5[last])
            if dd is None: continue
            mv2 = ma5_5[last]; m60v2 = ma60_5[last]; p = c5[last]
            if mv2 is None or m60v2 is None: continue
            if not pos:
                if dd and mv2 > m60v2 and day != sd: pos = True; ep = p; sd = day
            else:
                if mv2 < m60v2 and day != sd: last_pnl = (p-ep)/ep*100; pos = False; sd = day
        if pos: last_pnl = (c5[-1]-ep)/ep*100
        
        results.append({'code':code,'price':round(price,3),'direction':direction,'ma5':round(mv,3),
                        'ma60':round(m60v,3),'signal':signal,'last_pnl':round(last_pnl,2)})
        print(f'{code}: {signal} {direction} {price}')
    except Exception as e:
        print(f'{code} error: {e}')

data = {'update_time': datetime.now().strftime('%Y-%m-%d %H:%M'), 'etfs': results}
with open('data.json', 'w') as f: json.dump(data, f, ensure_ascii=False, indent=2)
print(f'Updated {len(results)} ETFs')
"
      
      - name: 提交更新
        run: |
          git config user.name 'ETF Bot'
          git config user.email 'bot@etf-signal'
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m 'auto update ETF data'
          git push
