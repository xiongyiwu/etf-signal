<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ETF 信号监测站</title>
<style>
:root{ --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--link:#58a6ff;--green:#3fb950;--red:#f85149;--gold:#d29922;--accent:#238636 }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Microsoft YaHei',sans-serif;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:16px}
header{text-align:center;padding:20px 0 12px}
header h1{font-size:22px;color:var(--link);font-weight:700;letter-spacing:-0.5px}
header .sub{font-size:12px;color:var(--dim);margin-top:4px}
.toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 0;gap:8px}
.toolbar .time{font-size:11px;color:var(--dim);flex:1}
.btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.btn-pri{background:var(--accent);color:#fff}
.btn-pri:hover{background:#2ea043}
.btn-ghost{background:transparent;color:var(--link);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--link)}
.btn-danger{background:transparent;color:var(--dim);border:none;font-size:14px;padding:2px 6px;opacity:0}
.card:hover .btn-danger{opacity:1}
.btn-danger:hover{color:var(--red)}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-card .num{font-size:24px;font-weight:700}
.stat-card .label{font-size:11px;color:var(--dim);margin-top:2px}
.stat-buy .num{color:var(--red)}
.stat-hold .num{color:var(--gold)}
.stat-wait .num{color:var(--green)}

.etf-list{display:flex;flex-direction:column;gap:6px}
.etf-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.etf-card:hover{border-color:var(--link)}
.etf-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.etf-card.buy::before{background:var(--red)}
.etf-card.hold::before{background:var(--gold)}
.etf-card.wait::before{background:var(--green)}
.etf-card .row{display:flex;align-items:center;gap:8px}
.etf-card .info{flex:1;min-width:0}
.etf-card .name{font-size:15px;font-weight:600}
.etf-card .code{font-size:11px;color:var(--dim);margin-left:4px}
.badge{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:700;white-space:nowrap}
.badge-buy{background:rgba(248,81,73,0.15);color:var(--red)}
.badge-hold{background:rgba(210,153,34,0.15);color:var(--gold)}
.badge-wait{background:rgba(63,185,80,0.15);color:var(--green)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;font-size:12px}
.grid .lbl{color:var(--dim);font-size:10px}
.grid .val{font-weight:600}
.val.red{color:var(--red)}.val.green{color:var(--green)}.val.gold{color:var(--gold)}.val.dim{color:var(--dim)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:90%;max-width:400px}
.modal h3{font-size:16px;margin-bottom:16px}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.modal input:focus{border-color:var(--link)}
.modal .hint{font-size:11px;color:var(--dim);margin-bottom:12px}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--link);border-radius:50%;animation:spin .6s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px;color:#21262d;font-size:10px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.tag{background:var(--bg);color:var(--dim);font-size:9px;padding:1px 6px;border-radius:4px;margin-left:4px}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>📡 ETF 信号监测站</h1>
  <div class="sub">120分定方向 · 5分MA交叉 · 全球可访问</div>
</header>
<div class="toolbar">
  <div class="time" id="time">加载中...</div>
  <button class="btn btn-ghost" onclick="refresh()">⟳ 刷新</button>
  <button class="btn btn-pri" onclick="showModal()">+ 添加</button>
</div>

<div class="stats">
  <div class="stat-card stat-buy"><div class="num" id="cntBuy">-</div><div class="label">买入</div></div>
  <div class="stat-card stat-hold"><div class="num" id="cntHold">-</div><div class="label">持仓</div></div>
  <div class="stat-card stat-wait"><div class="num" id="cntWait">-</div><div class="label">空仓</div></div>
</div>

<div class="etf-list" id="list"></div>
<div class="footer">数据每日自动更新 · 跌🟢涨🔴</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>添加自选ETF</h3>
    <input id="codeInput" placeholder="ETF代码, 多个逗号分隔" onkeydown="if(event.key=='Enter')addETF()">
    <div class="hint">例: 512400,159819<br>添加后提交换图数据源更新</div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="hideModal()">取消</button>
      <button class="btn btn-pri" onclick="addETF()">添加</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const builtin = ['589720','159611','588170','515050','159819','159852','159869','512400','512710','515400','561380','563230'];
const names = {589720:'科创创新药',159611:'广发电力',588170:'科创半导体',515050:'通信',159819:'人工智能',159852:'软件',159869:'游戏',512400:'有色',512710:'军工龙头',515400:'大数据',561380:'电网设备',563230:'卫星'};
const nameMap = JSON.parse(JSON.stringify(names));

function getList(){let s=localStorage.getItem('etf_list'),c=s?JSON.parse(s):[];return[...new Set([...builtin,...c])]}
function saveCustom(l){localStorage.setItem('etf_list',JSON.stringify(l.filter(c=>!builtin.includes(c))))}

async function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function showModal(){document.getElementById('modalOverlay').classList.add('show');document.getElementById('codeInput').focus()}
function hideModal(){document.getElementById('modalOverlay').classList.remove('show');document.getElementById('codeInput').value=''}

function addETF(){
  let codes=document.getElementById('codeInput').value.trim().replace(/[，,]/g,',').split(',').map(c=>c.trim()).filter(c=>c.match(/^\d{6}$/));
  if(!codes.length){toast('请输入6位代码');return}
  let list=getList(),added=[];
  for(let c of codes){if(!list.includes(c)){list.push(c);added.push(c)}}
  saveCustom(list);
  toast(added.length?`已添加 ${added.join(', ')}`:'已在列表中');
  hideModal();
  refresh();
}
function delETF(code){if(builtin.includes(code))return;let list=getList().filter(c=>c!==code);saveCustom(list);toast(`已移除 ${code}`);refresh()}

// ====== 核心：从data.json加载 ======
async function refresh(){
  document.getElementById('list').innerHTML='<div class="spinner"></div>';
  let results = [];
  
  // 1. 从data.json读取预设数据
  try{
    let r=await fetch('data.json?_='+Date.now());
    let d=await r.json();
    let etfMap={};
    for(let e of d.etfs) etfMap[e.code]=e;
    
    for(let code of getList()){
      if(etfMap[code]){
        let e=etfMap[code];
        e.name=nameMap[code]||e.name||code;
        results.push(e);
      }else{
        // 用户自定义但不在预设数据中 → 尝试实时获取
        let live = await fetchLive(code);
        if(live) results.push(live);
        else results.push({code,name:code,price:0,direction:'--',ma5:0,ma60:0,signal:'nodata',last_pnl:0});
      }
    }
    
    if(results.length) results[0]._time=d.update_time||'';
  }catch(e){
    console.error('加载data.json失败',e);
  }
  
  // 排序：买入>持仓>空仓>无数据
  let order={买入:0,持仓:1,空仓:2,nodata:3};
  results.sort((a,b)=>(order[a.signal]||9)-(order[b.signal]||9));
  render(results);
}

// ====== 实时获取（用户自定义ETF） ======
async function fetchLive(code){
  try{
    let r=await fetch(`https://quotes.sina.cn/cn/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh${code}&scale=5&datalen=100`);
    let d5=await r.json();
    if(!d5||d5.length<20) return null;
    
    r=await fetch(`https://quotes.sina.cn/cn/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh${code}&scale=120&datalen=120`);
    let d120=await r.json();
    if(!d120||d120.length<60) return null;
    
    let c5=d5.map(x=>parseFloat(x.close)),t5=d5.map(x=>x.day);
    let c120=d120.map(x=>parseFloat(x.close)),t120=d120.map(x=>x.day);
    let ma5_5=calcMA(c5,5),ma60_5=calcMA(c5,60);
    let ma5_120=calcMA(c120,5),ma60_120=calcMA(c120,60);
    
    let dirMap={};
    for(let i=0;i<t120.length;i++){if(ma5_120[i]!==null&&ma60_120[i]!==null)dirMap[t120[i]]=ma5_120[i]>ma60_120[i]}
    function gd(ts){let dt=new Date(ts.replace(' ','T')),best=null,bd=null;for(let k in dirMap){let kd=new Date(k.replace(' ','T'));if(kd<=dt&&(!bd||kd>bd)){best=k;bd=kd;}}return dirMap[best]}
    
    let curDir=gd(t5[t5.length-1]),mv=ma5_5[ma5_5.length-1]||0,m60v=ma60_5[ma60_5.length-1]||0,price=c5[c5.length-1];
    let signal=(curDir&&mv>m60v)?'买入':'空仓';
    return {code,name:code,price:round(price),direction:curDir?'多头':'空头',ma5:round(mv),ma60:round(m60v),signal,last_pnl:0};
  }catch(e){return null}
}

function calcMA(arr,p){let r=[];for(let i=0;i<arr.length;i++){if(i>=p-1){let s=0;for(let j=i-p+1;j<=i;j++)s+=arr[j];r.push(s/p)}else r.push(null);}return r}
function round(v){return Math.round(v*1000)/1000}

function render(data){
  let t=d=new Date();
  if(data.length&&data[0]._time) document.getElementById('time').textContent='数据更新: '+data[0]._time;
  else document.getElementById('time').textContent='加载: '+d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  
  let cb=0,ch=0,cw=0,html='';
  for(let e of data){
    if(e.signal==='买入')cb++;else if(e.signal==='持仓')ch++;else if(e.signal==='空仓')cw++;
    let cc=e.signal==='买入'?'buy':(e.signal==='持仓'?'hold':'wait');
    let bc=e.signal==='买入'?'badge-buy':(e.signal==='持仓'?'badge-hold':'badge-wait');
    let dc=e.direction==='多头'?'red':'green';
    let pc=e.last_pnl>0?'red':(e.last_pnl<0?'green':'gold');
    let prc=e.price>e.ma5?'red':'green';
    let del=builtin.includes(e.code)?'':`<button class="btn-danger" onclick="event.stopPropagation();delETF('${e.code}')">✕</button>`;
    
    html+=`<div class="etf-card ${cc}"><div class="row"><div class="info"><span class="name">${e.name||e.code}</span><span class="code">${e.code}</span></div><span class="badge ${bc}">${e.signal}</span>${del}</div>
    <div class="grid">
      <div><div class="lbl">价格</div><div class="val ${prc}">${e.price.toFixed(3)}</div></div>
      <div><div class="lbl">120分</div><div class="val ${dc}">${e.direction}</div></div>
      <div><div class="lbl">MA5/MA60</div><div class="val">${e.ma5.toFixed(2)}/${e.ma60.toFixed(2)}</div></div>
      <div><div class="lbl">价差</div><div class="val ${prc}">${(e.ma5-e.ma60).toFixed(3)}</div></div>
      <div><div class="lbl">上次盈亏</div><div class="val ${pc}">${e.last_pnl>0?'+':''}${e.last_pnl.toFixed(2)}%</div></div>
      <div></div>
    </div></div>`;
  }
  document.getElementById('list').innerHTML=html||'<div style="text-align:center;padding:60px;color:var(--dim)">暂无数据</div>';
  document.getElementById('cntBuy').textContent=cb;
  document.getElementById('cntHold').textContent=ch;
  document.getElementById('cntWait').textContent=cw;
}

refresh();
setInterval(refresh, 180000);
</script>
</body>
</html>
