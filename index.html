<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETF信号监控</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,'Microsoft YaHei',sans-serif;padding:16px;min-height:100vh}
  h1{font-size:20px;margin:10px 0 16px;text-align:center;color:#58a6ff;font-weight:600}
  .date{text-align:center;color:#8b949e;font-size:13px;margin-bottom:16px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;margin-bottom:12px}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .card-name{font-size:16px;font-weight:600;color:#c9d1d9}
  .card-code{font-size:12px;color:#8b949e;margin-left:6px}
  .tag{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:600}
  .tag-bull{background:#003d1f;color:#3fb950;border:1px solid #3fb950}
  .tag-bear{background:#3d0000;color:#f85149;border:1px solid #f85149}
  .tag-hold{background:#003d1f;color:#3fb950;border:1px solid #3fb950}
  .tag-wait{background:#1c1c00;color:#d29922;border:1px solid #d29922}
  .info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
  .info-label{color:#8b949e}
  .info-value{color:#c9d1d9;font-weight:500}
  .info-value.green{color:#3fb950}
  .info-value.red{color:#f85149}
  .info-value.yellow{color:#d29922}
  .last-time{text-align:center;color:#484f58;font-size:11px;margin-top:16px}
</style>
</head>
<body>
<h1>ETF 信号监控</h1>
<div class="date" id="updateTime">加载中...</div>
<div id="cards"><div style="text-align:center;padding:40px;color:#8b949e">加载中...</div></div>
<div class="last-time">规则: 120分MA5/MA60定方向 + 5分MA5/MA60交叉</div>

<script>
async function loadData(){
  try{
    const r=await fetch('data.json?_t='+Date.now());
    const d=await r.json();
    document.getElementById('updateTime').textContent='更新: '+(d.update_time||'--');
    let html='';
    for(const e of d.etfs){
      const dirTag=e.direction==='多头'?'<span class="tag tag-bull">多头</span>':'<span class="tag tag-bear">空头</span>';
      const sigTag=e.signal==='持仓'?'<span class="tag tag-hold">持仓</span>':'<span class="tag tag-wait">空仓</span>';
      const pc=e.last_pnl>0?'green':(e.last_pnl<0?'red':'yellow');
      html+='<div class="card"><div class="card-header"><div><span class="card-name">'+e.name+'</span><span class="card-code">'+e.code+'</span></div>'+sigTag+'</div>'+
        '<div class="info-row"><span class="info-label">当前价</span><span class="info-value">'+e.price.toFixed(3)+'</span></div>'+
        '<div class="info-row"><span class="info-label">120分钟</span><span>'+dirTag+'</span></div>'+
        '<div class="info-row"><span class="info-label">MA5</span><span class="info-value">'+e.ma5.toFixed(3)+'</span></div>'+
        '<div class="info-row"><span class="info-label">MA60</span><span class="info-value">'+e.ma60.toFixed(3)+'</span></div>'+
        '<div class="info-row"><span class="info-label">上次盈亏</span><span class="info-value '+pc+'">'+(e.last_pnl>0?'+':'')+e.last_pnl.toFixed(2)+'%</span></div></div>';
    }
    document.getElementById('cards').innerHTML=html;
  }catch(e){
    document.getElementById('cards').innerHTML='<div style="text-align:center;padding:40px;color:#f85149">数据加载失败，请刷新</div>';
  }
}
loadData();
setInterval(loadData,60000);
</script>
</body>
</html>
